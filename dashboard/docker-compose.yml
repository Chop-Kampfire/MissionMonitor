version: "3.8"

services:
  dashboard:
    build: .
    container_name: mission-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    ports:
      - "3001:3001"
    volumes:
      - /root/MissionMonitor/data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
